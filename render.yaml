# Render Blueprint. Free web service (Docker) + free Postgres.
# Set RAILS_MASTER_KEY in the dashboard (value = config/master.key).
databases:
  - name: merchant-os-db
    databaseName: merchant_os
    user: merchant_os
    plan: free
    region: singapore

services:
  - type: web
    name: merchant-os
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /up
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false # set manually in the dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: merchant-os-db
          property: connectionString
      - key: PORT
        value: "80" # Thruster listens on 80 (matches the Dockerfile)
